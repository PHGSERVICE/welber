<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cartão de Visita Digital — PHG Service</title>
<meta name="description" content="Cartão de visita digital — PHG Service">
<meta name="theme-color" content="#0B3D4A">
<link rel="icon" href="data:,">
<style>
/* =========================================================
   PALETA PHG SERVICE — ajuste fino aqui
   ========================================================= */
:root{
  --petroleo:      #0B3D4A;   /* fundo e blocos */
  --laranja:       #F26B21;   /* destaque, CTAs, ícones ativos */
  --verde:         #3FA535;   /* acento secundário (marcadores da lista) */

  /* Derivadas (tons de apoio gerados a partir da paleta) */
  --petroleo-fundo:#072B34;   /* fundo da página, um passo mais escuro */
  --petroleo-bloco:#0F4A5A;   /* blocos elevados sobre o card */
  --texto:         #FFFFFF;
  --texto-suave:   #B9CBD1;   /* cinza-claro para textos secundários */
  --borda:         rgba(255,255,255,.10);

  --raio:          22px;
  --raio-sm:       14px;
  --sombra:        0 18px 50px rgba(0,0,0,.38);
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  min-height:100svh;
  background:var(--petroleo-fundo);
  color:var(--texto);
  font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;justify-content:center;
  padding:clamp(12px,4vw,32px);
  padding-bottom:calc(clamp(12px,4vw,32px) + env(safe-area-inset-bottom));
}
img{max-width:100%;display:block}
button{font:inherit}

/* ---------- CARD PRINCIPAL (vertical, ocupa a tela do celular) ---------- */
.card{
  width:100%;max-width:430px;
  display:flex;flex-direction:column;
  background:var(--petroleo);
  border:1px solid var(--borda);
  border-radius:var(--raio);
  box-shadow:var(--sombra);
  overflow:hidden;
  /* filete industrial nas 3 cores da marca */
  border-top:3px solid var(--laranja);
}

/* ---------- TOPO: logo, foto, nome, cargo ---------- */
.topo{
  position:relative;
  padding:22px 22px 26px;
  text-align:center;
  background:
    radial-gradient(120% 90% at 50% -10%, rgba(242,107,33,.16) 0%, rgba(242,107,33,0) 62%),
    var(--petroleo);
  border-bottom:1px solid var(--borda);
}
.logo{height:76px;width:auto;margin:0 auto 16px;object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.35))}
.logo-texto{
  margin:0 auto 20px;font-weight:800;letter-spacing:.22em;
  font-size:16px;color:var(--texto);
}
.logo-texto span{color:var(--laranja)}

.foto-wrap{
  width:124px;height:124px;margin:0 auto 14px;
  border-radius:50%;padding:3px;
  background:linear-gradient(180deg,var(--laranja),var(--verde));
}
.foto,.foto-fallback{
  width:100%;height:100%;border-radius:50%;
  object-fit:cover;
  border:3px solid var(--petroleo);
  background:var(--petroleo-bloco);
}
.foto-fallback{
  display:flex;align-items:center;justify-content:center;
  font-size:38px;font-weight:700;color:var(--laranja);letter-spacing:.04em;
}
.nome{
  margin:0 0 6px;
  font-size:clamp(21px,5.6vw,25px);font-weight:700;line-height:1.2;
}
.cargo{
  margin:0;display:inline-block;
  padding:5px 14px;border-radius:999px;
  background:rgba(242,107,33,.12);
  border:1px solid rgba(242,107,33,.45);
  color:var(--laranja);
  font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
}

/* ---------- CORPO ---------- */
.corpo{
  flex:1;
  display:flex;flex-direction:column;gap:22px;
  padding:22px 20px;
}
.secao > h2{                  /* título de seção (ÁREAS DE ATUAÇÃO / CONTATO) */
  margin:0 0 12px;
  font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--texto-suave);
}
.secao > h2::after{
  content:"";display:block;width:28px;height:2px;margin-top:8px;
  background:var(--verde);
}

/* Contatos: ícone circular + rótulo + o dado escrito por extenso */
.contatos{display:flex;flex-direction:column;gap:8px}
.contato{
  display:flex;align-items:center;gap:13px;
  padding:10px 12px;
  border-radius:var(--raio-sm);
  background:var(--petroleo-bloco);
  border:1px solid var(--borda);
  text-decoration:none;color:var(--texto);
  transition:background .18s ease,border-color .18s ease,transform .12s ease;
}
.contato:hover,.contato:focus-visible{
  background:#12586b;border-color:var(--laranja);transform:translateX(2px);outline:none;
}
.contato:focus-visible{box-shadow:0 0 0 3px rgba(242,107,33,.30)}
.icone{                        /* ícone circular, mantido como na referência */
  width:42px;height:42px;flex:0 0 42px;
  display:grid;place-items:center;
  border-radius:50%;
  background:rgba(242,107,33,.12);
  border:1px solid rgba(242,107,33,.35);
  color:var(--laranja);
}
.icone svg{width:20px;height:20px}
.contato-txt{min-width:0;display:flex;flex-direction:column;gap:2px}
.contato-rot{
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--texto-suave);
}
.contato-val{
  font-size:14px;line-height:1.3;font-weight:500;
  overflow-wrap:anywhere;      /* e-mail/URL longos quebram em vez de estourar o card */
}

/* Áreas de atuação */
.areas ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
.areas li{
  position:relative;padding-left:20px;
  font-size:14.5px;line-height:1.4;
}
.areas li::before{             /* marcador verde (acento secundário) */
  content:"";position:absolute;left:0;top:.45em;
  width:8px;height:8px;border-radius:2px;
  background:var(--verde);
}

/* ---------- RODAPÉ: CTAs ---------- */
.rodape{
  display:flex;flex-direction:column;gap:10px;
  padding:0 22px 22px;
}
/* .btn serve tanto para <button> quanto para <a> (o "Salvar contato" é um link real
   para o .vcf — sem isso o Safari do iPhone recusa o arquivo) */
.btn{
  display:flex;align-items:center;justify-content:center;gap:9px;
  width:100%;padding:15px 16px;
  border-radius:var(--raio-sm);
  font-size:15px;font-weight:600;
  cursor:pointer;
  border:1px solid transparent;
  text-decoration:none;               /* quando for <a> */
  -webkit-tap-highlight-color:transparent;
  transition:filter .18s ease,background .18s ease,transform .12s ease;
}
a.btn:hover{text-decoration:none}
.btn:active{transform:scale(.985)}
.btn svg{width:19px;height:19px}
.btn-primario{background:var(--laranja);color:#fff}
.btn-primario:hover{filter:brightness(1.08)}
.btn-secundario{
  background:transparent;color:var(--texto);
  border-color:rgba(255,255,255,.22);
}
.btn-secundario:hover{background:var(--petroleo-bloco);border-color:var(--verde)}
.btn:focus-visible{outline:2px solid var(--verde);outline-offset:2px}

/* ---------- MODAL DE COMPARTILHAR (QR CODE) ---------- */
.modal[hidden]{display:none}
.modal{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  background:rgba(3,18,22,.78);
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
  animation:fade .18s ease;
}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal-box{
  width:100%;max-width:360px;
  background:var(--petroleo);
  border:1px solid var(--borda);
  border-top:3px solid var(--laranja);
  border-radius:var(--raio);
  padding:24px 22px;
  text-align:center;
  box-shadow:var(--sombra);
}
.modal-box h2{margin:0 0 14px;font-size:17px}
.modal-dica{margin:0 0 16px;font-size:12.5px;line-height:1.45;color:var(--texto-suave);min-height:36px}

/* Abas do modal: Contato (padrão) | Link da página */
.abas{
  display:flex;gap:4px;padding:4px;margin-bottom:14px;
  background:var(--petroleo-fundo);
  border:1px solid var(--borda);
  border-radius:999px;
}
.aba{
  flex:1;padding:9px 8px;
  border:0;border-radius:999px;
  background:transparent;color:var(--texto-suave);
  font-size:12.5px;font-weight:600;cursor:pointer;
  transition:background .18s ease,color .18s ease;
}
.aba.ativa{background:var(--laranja);color:#fff}
.aba[hidden]{display:none}
.aba:focus-visible{outline:2px solid var(--verde);outline-offset:2px}
.qr-box{
  background:#fff;border-radius:var(--raio-sm);
  padding:10px;display:block;line-height:0;
}
/* QR o maior possível: quanto maior o módulo na tela, mais fácil a câmera do cliente lê.
   Testado com simulação de câmera — abaixo de ~4,5 px por módulo a leitura começa a falhar. */
.qr-box canvas{
  width:100%;max-width:300px;height:auto;aspect-ratio:1;
  margin:0 auto;display:block;image-rendering:pixelated;
}
.modal-url{
  margin:16px 0 0;font-size:11px;color:var(--texto-suave);
  word-break:break-all;
}
.modal-acoes{display:flex;flex-direction:column;gap:9px;margin-top:16px}
.modal-acoes .btn{padding:12px}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<main class="card" id="card" aria-label="Cartão de visita digital"></main>

<!-- Modal do QR Code -->
<div class="modal" id="modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
  <div class="modal-box">
    <h2 id="modal-titulo">Compartilhar cartão</h2>
    <div class="abas" role="tablist">
      <button class="aba ativa" data-aba="contato" type="button">Contato</button>
      <button class="aba" data-aba="link" type="button">Link da página</button>
    </div>
    <p class="modal-dica" id="modal-dica"></p>
    <div class="qr-box"><canvas id="qr"></canvas></div>
    <p class="modal-url" id="modal-url"></p>
    <div class="modal-acoes">
      <a class="btn btn-primario" id="btn-acao" role="button" href="#">Salvar contato</a>
      <button class="btn btn-secundario" id="btn-fechar" type="button">Fechar</button>
    </div>
  </div>
</div>

/* =========================================================================
   3) MONTAGEM DO CARTÃO — só renderiza o que estiver preenchido
   ========================================================================= */
const val = v => (typeof v === "string" ? v.trim() : "");
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// Formata o telefone brasileiro para leitura: 5511986899288 -> +55 (11) 98689-9288
function telefoneBonito(d){
  const m = d.match(/^55(\d{2})(\d{4,5})(\d{4})$/);
  return m ? `+55 (${m[1]}) ${m[2]}-${m[3]}` : "+" + d;
}
// Encurta URL para exibição (o link continua completo): https://www.x.com/y/ -> x.com/y
const urlBonita = u => val(u).replace(/^https?:\/\//i, "").replace(/^www\./i, "").replace(/\/$/, "");

// Lista de contatos: cada item só entra se o campo do CONFIG tiver valor.
// "rot" = rótulo da linha | "txt" = o dado que aparece escrito no card.
function montarContatos(){
  const c = [];
  const wpp = val(CONFIG.whatsapp).replace(/\D/g, "");   // mantém só dígitos
  if (wpp)                   c.push({k:"whatsapp",  rot:"WhatsApp",  txt:telefoneBonito(wpp),          href:`https://wa.me/${wpp}`});
  if (val(CONFIG.instagram)) c.push({k:"instagram", rot:"Instagram", txt:"@" + val(CONFIG.instagram).replace(/^@/,""), href:`https://instagram.com/${val(CONFIG.instagram).replace(/^@/,"")}`});
  if (val(CONFIG.email))     c.push({k:"email",     rot:"E-mail",    txt:val(CONFIG.email),            href:`mailto:${val(CONFIG.email)}`});
  if (val(CONFIG.linkedin))  c.push({k:"linkedin",  rot:"LinkedIn",  txt:urlBonita(CONFIG.linkedin),   href:val(CONFIG.linkedin)});
  if (val(CONFIG.endereco))  c.push({k:"endereco",  rot:"Endereço",  txt:val(CONFIG.endereco),         href:`https://maps.google.com/?q=${encodeURIComponent(val(CONFIG.endereco))}`});
  if (val(CONFIG.site))      c.push({k:"site",      rot:"Site",      txt:urlBonita(CONFIG.site),       href:val(CONFIG.site)});
  return c;
}

function iniciais(nome){
  const p = val(nome).split(/\s+/).filter(Boolean);
  if (!p.length) return "PHG";
  return (p[0][0] + (p.length > 1 ? p[p.length-1][0] : "")).toUpperCase();
}

function renderizar(){
  const contatos = montarContatos();
  const areas = (CONFIG.areas || []).map(val).filter(Boolean);   // ignora áreas vazias
  const nome = val(CONFIG.nome);
  const cargo = val(CONFIG.cargo);

  // Topo: logo (imagem ou texto), foto (imagem ou iniciais), nome e cargo
  const logo = val(CONFIG.logoUrl)
    ? `<img class="logo" src="${esc(CONFIG.logoUrl)}" alt="${esc(CONFIG.empresa)}" onerror="this.remove()">`
    : `<div class="logo-texto">PHG <span>SERVICE</span></div>`;

  const foto = val(CONFIG.fotoUrl)
    ? `<img class="foto" src="${esc(CONFIG.fotoUrl)}" alt="${nome ? "Foto de " + esc(nome) : "Foto do gestor"}"
            onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'foto-fallback',textContent:'${esc(iniciais(nome))}'}))">`
    : `<div class="foto-fallback">${esc(iniciais(nome))}</div>`;

  const topo = `
    <header class="topo">
      ${logo}
      <div class="foto-wrap">${foto}</div>
      ${nome ? `<h1 class="nome">${esc(nome)}</h1>` : ""}
      ${cargo ? `<p class="cargo">${esc(cargo)}</p>` : ""}
    </header>`;

  // Corpo: áreas de atuação e, abaixo, os contatos com o dado escrito por extenso
  const blocoAreas = areas.length ? `
    <section class="secao areas">
      <h2>Áreas de atuação</h2>
      <ul>${areas.map(a => `<li>${esc(a)}</li>`).join("")}</ul>
    </section>` : "";

  const blocoContatos = contatos.length ? `
    <section class="secao">
      <h2>Contato</h2>
      <nav class="contatos" aria-label="Contatos">
        ${contatos.map(c => `
          <a class="contato" href="${esc(c.href)}"
             ${c.k === "email" ? "" : 'target="_blank" rel="noopener noreferrer"'}>
            <span class="icone" aria-hidden="true">${ICONES[c.k]}</span>
            <span class="contato-txt">
              <span class="contato-rot">${esc(c.rot)}</span>
              <span class="contato-val">${esc(c.txt)}</span>
            </span>
          </a>`).join("")}
      </nav>
    </section>` : "";

  const corpo = (blocoAreas || blocoContatos)
    ? `<div class="corpo">${blocoAreas}${blocoContatos}</div>`
    : "";

  // "Salvar contato": vira um link real para o .vcf quando ele existe (única forma de
  // funcionar no iPhone). Sem arquivo, cai no método antigo, que gera o vCard na hora.
  const salvar = temArquivoVCard()
    ? `<a class="btn btn-primario" id="btn-vcard" href="${esc(CONFIG.vcardUrl)}" type="text/vcard">${ICONES.baixar} Salvar contato</a>`
    : `<button class="btn btn-primario" id="btn-vcard" type="button">${ICONES.baixar} Salvar contato</button>`;

  const rodape = `
    <footer class="rodape">
      ${salvar}
      <button class="btn btn-secundario" id="btn-compartilhar" type="button">${ICONES.compartilhar} Compartilhar</button>
    </footer>`;

  document.getElementById("card").innerHTML = topo + corpo + rodape;
  if (!temArquivoVCard()) document.getElementById("btn-vcard").addEventListener("click", baixarVCard);
  document.getElementById("btn-compartilhar").addEventListener("click", abrirModal);

  if (nome) document.title = `${nome} — ${cargo || CONFIG.empresa}`;
}

/* =========================================================================
   4) vCard — o MESMO texto alimenta o download (.vcf) e o QR Code de contato
   ========================================================================= */
// completo = true  -> versão para DOWNLOAD (.vcf): leva tudo, inclusive endereço e LinkedIn.
// completo = false -> versão para o QR CODE: sem endereço e sem LinkedIn.
//   Motivo: cada caractere a mais aumenta a densidade do QR e encolhe o módulo na tela.
//   Com endereço, o código vai a 73x73 e a câmera do cliente falha em ler.
//   Sem ele, cai para 57x57 e a leitura fica folgada. O endereço continua visível
//   no card e vem completo no .vcf baixado.
function textoVCard(completo){
  const nome = val(CONFIG.nome) || "Contato";
  const partes = nome.split(/\s+/);
  const primeiro = partes[0] || "";
  const sobrenome = partes.slice(1).join(" ");
  // escape exigido pelo padrão vCard (vírgula, ponto-e-vírgula, barra invertida)
  const e = s => String(s).replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");

  const linhas = ["BEGIN:VCARD","VERSION:3.0"];
  linhas.push(`N:${e(sobrenome)};${e(primeiro)};;;`);
  linhas.push(`FN:${e(nome)}`);
  if (val(CONFIG.empresa)) linhas.push(`ORG:${e(CONFIG.empresa)}`);
  if (val(CONFIG.cargo))   linhas.push(`TITLE:${e(CONFIG.cargo)}`);

  const wpp = val(CONFIG.whatsapp).replace(/\D/g,"");
  if (wpp) linhas.push(`TEL;TYPE=CELL,VOICE:+${wpp}`);
  if (val(CONFIG.email))    linhas.push(`EMAIL;TYPE=INTERNET,WORK:${e(CONFIG.email)}`);
  if (val(CONFIG.site))     linhas.push(`URL:${e(CONFIG.site)}`);
  if (completo && val(CONFIG.endereco)) linhas.push(`ADR;TYPE=WORK:;;${e(CONFIG.endereco)};;;;`);
  if (completo && val(CONFIG.linkedin)) linhas.push(`X-SOCIALPROFILE;TYPE=linkedin:${e(CONFIG.linkedin)}`);
  linhas.push("END:VCARD");
  return linhas.join("\r\n") + "\r\n";
}

// O .vcf hospedado só serve quando a página está na web (http/https).
// Aberta como arquivo local, o navegador não consegue buscá-lo — aí usamos o método antigo.
const temArquivoVCard = () => !!val(CONFIG.vcardUrl) && /^https?:$/i.test(window.location.protocol);

// Método antigo (gera o vCard na hora). Só é usado quando NÃO há arquivo hospedado.
// No iPhone ele falha ("O Safari não pode baixar esse arquivo") — por isso o arquivo real existe.
function baixarVCard(){
  const nome = val(CONFIG.nome) || "Contato";
  const vcf = textoVCard(true);
  const blob = new Blob(["﻿" + vcf], {type:"text/vcard;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = nome.normalize("NFD").replace(/[^\w\s.-]/g, "").trim().replace(/\s+/g, "-") + ".vcf";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}

/* =========================================================================
   5) QR CODE — duas abas:
      "Contato" (padrão): os dados vão DENTRO do QR. O cliente escaneia e salva
                          na agenda mesmo SEM internet. Não depende de hospedagem.
      "Link":             abre a página do cartão. Só aparece se houver uma URL
                          pública de verdade (http/https).
   ========================================================================= */
const modal = document.getElementById("modal");

// URL que o QR de link carrega: a fixa do CONFIG, ou a da própria página.
const urlDoCartao = () => val(CONFIG.urlPublica) || window.location.href;
// Só faz sentido oferecer o QR de link se a página estiver publicada na web.
const temLinkPublico = () => /^https?:\/\//i.test(urlDoCartao());

// Desenha qualquer texto como QR no canvas.
// ecc: "L" (menos redundância -> código menor -> módulo maior na tela -> lê mais fácil)
//      "M" (mais redundância). Para texto curto, como um link, "M" cabe sem problema.
function desenharQR(texto, ecc){
  qrcode.stringToBytes = qrcode.stringToBytesFuncs["UTF-8"];  // necessário p/ acentos
  const qr = qrcode(0, ecc || "M");     // 0 = escolhe a versão automaticamente
  qr.addData(texto, "Byte");
  qr.make();

  const n = qr.getModuleCount();
  const escala = 6, margem = 4;         // margem = zona silenciosa (obrigatória para leitura)
  const lado = (n + margem * 2) * escala;
  const cv = document.getElementById("qr");
  cv.width = cv.height = lado;

  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(0, 0, lado, lado);
  ctx.fillStyle = "#0B3D4A";            // módulos em azul-petróleo (alto contraste sobre branco)
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      if (qr.isDark(r, c))
        ctx.fillRect((c + margem) * escala, (r + margem) * escala, escala, escala);
}

let abaAtual = "contato";
function mostrarAba(aba){
  abaAtual = aba;
  document.querySelectorAll(".aba").forEach(b =>
    b.classList.toggle("ativa", b.dataset.aba === aba));

  const ehContato = aba === "contato";
  // contato usa "L" de propósito: o vCard é longo, e "L" mantém o código pequeno o
  // bastante para a câmera ler. O link é curto, então "M" (mais robusto) cabe folgado.
  desenharQR(ehContato ? textoVCard(false) : urlDoCartao(), ehContato ? "L" : "M");

  document.getElementById("modal-dica").textContent = ehContato
    ? "Aponte a câmera. O contato é salvo direto na agenda — funciona sem internet."
    : "Aponte a câmera para abrir a página do cartão.";
  document.getElementById("modal-url").textContent = ehContato ? "" : urlDoCartao();

  const acao = document.getElementById("btn-acao");
  acao.textContent = ehContato ? "Salvar contato" : "Copiar link";
  // Na aba Contato, o botão vira um link real para o .vcf — é o que faz o iPhone funcionar.
  if (ehContato && temArquivoVCard()) acao.setAttribute("href", CONFIG.vcardUrl);
  else acao.setAttribute("href", "#");
}

function abrirModal(){
  // Se a página não estiver publicada, a aba de link some (nada de QR quebrado).
  document.querySelector('.aba[data-aba="link"]').hidden = !temLinkPublico();
  mostrarAba("contato");
  modal.hidden = false;
  document.getElementById("btn-fechar").focus();
}
function fecharModal(){
  modal.hidden = true;
  document.getElementById("btn-compartilhar").focus();
}

document.querySelectorAll(".aba").forEach(b =>
  b.addEventListener("click", () => mostrarAba(b.dataset.aba)));
document.getElementById("btn-fechar").addEventListener("click", fecharModal);
modal.addEventListener("click", ev => { if (ev.target === modal) fecharModal(); });
document.addEventListener("keydown", ev => { if (ev.key === "Escape" && !modal.hidden) fecharModal(); });

// Botão de ação do modal: salva o contato (aba Contato) ou copia o link (aba Link)
document.getElementById("btn-acao").addEventListener("click", async function(ev){
  if (abaAtual === "contato") {
    // Com arquivo .vcf hospedado, deixamos o link seguir sozinho (o iPhone precisa disso).
    if (temArquivoVCard()) return;
    ev.preventDefault();
    baixarVCard();
    return;
  }
  ev.preventDefault();
  const url = urlDoCartao();
  const btn = this;
  try {
    if (navigator.share) { await navigator.share({title: document.title, url}); return; }
    await navigator.clipboard.writeText(url);
    const antes = btn.textContent;
    btn.textContent = "Link copiado!";
    setTimeout(() => { btn.textContent = antes; }, 1800);
  } catch (_) { /* usuário cancelou ou navegador bloqueou — sem ação */ }
});

renderizar();
</script>
